<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your saved watchlist on WASUSANOCH. Keep track of movies, TV shows, and anime you want to watch.">
    <meta property="og:title" content="My List - WASUSANOCH">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#E50914">
    <title>My List - WASUSANOCH</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-family='Arial'>W</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav id="main-nav" aria-label="Main navigation"></nav>

    <main class="page-content">
        <div class="mylist-header">
            <h1 class="page-title">My WASUSANOCH List</h1>
            <p class="mylist-count" id="listCount"></p>
            <div class="search-tabs" style="margin-top:20px;">
                <button class="search-tab active" data-tab="all" id="tabAll">All</button>
                <button class="search-tab" data-tab="movie" id="tabMovies">Movies</button>
                <button class="search-tab" data-tab="tv" id="tabTV">TV Shows</button>
                <button class="search-tab" data-tab="tvmaze" id="tabTVMaze">TVMaze</button>
                <button class="search-tab" data-tab="anime" id="tabAnime">Anime</button>
                <div class="mylist-sort" style="display:flex;gap:10px;">
                    <select id="sortList" class="filter-select">
                        <option value="newest">Added: Newest First</option>
                        <option value="oldest">Added: Oldest First</option>
                        <option value="alpha">A-Z</option>
                    </select>
                    <button class="btn btn-outline" id="clearAllBtn" style="display:none;">Clear All</button>
                </div>
            </div>
        </div>

        <div class="content-grid section-padding" id="myListGrid">
            <!-- Items loaded by JS -->
        </div>
    </main>

    <footer id="main-footer" aria-label="Footer"></footer>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/mylist.js"></script>
    <script src="js/ui.js"></script>
    <script>
    const MyListPage = (() => {
        let currentFilter = 'all';

        function init() {
            UI.renderNav('mylist');
            UI.renderFooter();
            UI.initBackToTop();

            renderList();

            document.querySelectorAll('.search-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.search-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentFilter = tab.dataset.tab;
                    renderList();
                });
            });

            document.getElementById('clearAllBtn')?.addEventListener('click', () => {
                if (confirm('Are you sure you want to clear your entire list?')) {
                    MyList.clear();
                    renderList();
                    MyList.showToast('List cleared');
                }
            });
        }

        function renderList() {
            const grid = document.getElementById('myListGrid');
            const countEl = document.getElementById('listCount');
            const clearBtn = document.getElementById('clearAllBtn');

            let items = MyList.getAll();
            if (currentFilter !== 'all') {
                items = items.filter(i => i.type === currentFilter);
            }

            // Sort by most recently added
            items.sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));

            const totalCount = MyList.getAll().length;
            countEl.textContent = `${totalCount} item${totalCount !== 1 ? 's' : ''} saved`;
            clearBtn.style.display = totalCount > 0 ? '' : 'none';

            if (items.length === 0) {
                grid.innerHTML = `
                    <div class="mylist-empty col-full">
                        <div class="mylist-empty-icon">List</div>
                        <h2>Your list is empty</h2>
                        <p class="text-muted">Looks like you haven't added anything yet.</p>
                        <a href="index.html" class="btn btn-primary" style="margin-top:20px;">Discover Content</a>
                    </div>
                `;
                return;
            }

            grid.innerHTML = items.map(item => {
                const posterUrl = item.poster || CONFIG.PLACEHOLDER_IMG;
                const ratingColor = UI.getRatingColor(parseFloat(item.rating));
                let detailUrl = '#';
                if (item.type === 'movie') detailUrl = `detail.html?type=movie&id=${item.id}`;
                else if (item.type === 'tv') detailUrl = `detail.html?type=tv&id=${item.id}`;
                else if (item.type === 'tvmaze') detailUrl = `detail.html?type=tvmaze&id=${item.id}`;
                else if (item.type === 'anime') detailUrl = `detail.html?type=anime&id=${item.id}`;

                return `
                    <div class="content-card">
                        <a href="${detailUrl}" class="card-link" aria-label="${item.title}">
                            <div class="card-poster">
                                <img src="${posterUrl}" alt="${item.title}" loading="lazy" onerror="this.src='${CONFIG.PLACEHOLDER_IMG}'" />
                                <div class="card-overlay">
                                    <div class="card-play-btn"><svg width="30" height="30" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></div>
                                </div>
                            </div>
                            <div class="card-details">
                                <h3 class="card-title">${item.title}</h3>
                                <div class="card-meta">
                                    <span class="card-rating-sm" style="color:var(--color-gold)">★ ${item.rating || 'N/A'}</span>
                                    ${item.year ? `<span class="card-year-sm">${item.year}</span>` : ''}
                                </div>
                            </div>
                        </a>
                        <button class="card-bookmark active-btn" aria-label="Remove from My List"
                            onclick="event.preventDefault();event.stopPropagation();MyList.remove('${item.id}','${item.type}');this.closest('.content-card').remove();document.getElementById('listCount').textContent=MyList.getAll().length+' items saved';if(MyList.getAll().length===0)MyListPage.init();">
                            ✓
                        </button>
                    </div>
                `;
            }).join('');
        }

        return { init, renderList };
    })();
    document.addEventListener('DOMContentLoaded', MyListPage.init);
    </script>
</body>
</html>
