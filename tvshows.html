<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover popular TV shows, currently airing series, and show schedules on Dororo.">
    <meta property="og:title" content="TV Shows - Dororo">
    <meta property="og:description" content="Explore top-rated television series on Dororo.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#E50914">
    <title>TV Shows - Dororo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-family='Arial' fill='%23E50914'>D</text></svg>">
    <link rel="stylesheet" href="css/style.css?v=4">
    <link rel="stylesheet" href="css/animations.css?v=4">
    <link rel="stylesheet" href="css/responsive.css?v=4">
</head>
<body>
    <nav id="main-nav" aria-label="Main navigation"></nav>

    <main class="page-content">
        <section class="hero" id="hero" aria-label="Featured TV show">
            <div class="hero-backdrop" style="background:var(--bg-primary)"></div>
            <div class="hero-gradient"></div>
        </section>

        <div class="page-header">
            <h1 class="page-title">TV Shows</h1>
            <div class="filter-bar" id="filterBar">
                <select class="filter-select" id="genreFilter" aria-label="Filter by genre">
                    <option value="">All Genres</option>
                    <option value="Action">Action</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Drama">Drama</option>
                    <option value="Crime">Crime</option>
                    <option value="Fantasy">Fantasy</option>
                    <option value="Horror">Horror</option>
                    <option value="Romance">Romance</option>
                    <option value="Science-Fiction">Sci-Fi</option>
                    <option value="Thriller">Thriller</option>
                </select>
                <select class="filter-select" id="statusFilter" aria-label="Filter by status">
                    <option value="">All Status</option>
                    <option value="Running">Running</option>
                    <option value="Ended">Ended</option>
                    <option value="To Be Determined">TBD</option>
                </select>
            </div>
        </div>

        <div class="content-grid" id="tvGrid">
            <!-- Cards loaded by JS -->
        </div>

        <div class="load-more-container" id="loadMoreContainer">
            <button class="btn btn-outline" id="loadMoreBtn">Load More</button>
        </div>
    </main>

    <footer id="main-footer" aria-label="Footer"></footer>

    <script src="js/config.js?v=4"></script>
    <script src="js/api.js?v=4"></script>
    <script src="js/mylist.js?v=4"></script>
    <script src="js/ui.js?v=4"></script>
    <script>
    const TVShowsPage = (() => {
        let allShows = [];
        let currentPage = 0;
        let isLoading = false;
        let currentGenre = '';
        let currentStatus = '';
        let displayedCount = 0;
        const ITEMS_PER_PAGE = 24;

        async function init() {
            UI.renderNav('tvshows');
            UI.renderFooter();
            UI.initBackToTop();

            await loadInitialShows();
            loadHero();

            document.getElementById('genreFilter')?.addEventListener('change', () => { currentGenre = document.getElementById('genreFilter').value; filterAndDisplay(); });
            document.getElementById('statusFilter')?.addEventListener('change', () => { currentStatus = document.getElementById('statusFilter').value; filterAndDisplay(); });
            document.getElementById('loadMoreBtn')?.addEventListener('click', loadMoreShows);
        }

        async function loadInitialShows() {
            const grid = document.getElementById('tvGrid');
            grid.innerHTML = UI.generateSkeletonGrid(18);

            try {
                // Load multiple pages for better selection
                const [p0, p1, p2] = await Promise.allSettled([
                    API.TVMAZE.allShows(0),
                    API.TVMAZE.allShows(1),
                    API.TVMAZE.allShows(2),
                ]);
                [p0, p1, p2].forEach(r => {
                    if (r.status === 'fulfilled' && Array.isArray(r.value)) {
                        allShows.push(...r.value);
                    }
                });

                // Sort by rating
                allShows.sort((a, b) => (b.rating?.average || 0) - (a.rating?.average || 0));
                filterAndDisplay();
            } catch (err) {
                UI.showError(grid, 'Failed to load TV shows', () => loadInitialShows());
            }
        }

        function loadHero() {
            const heroEl = document.getElementById('hero');
            const topShows = allShows.filter(s => s.image && s.rating?.average > 7);
            if (topShows.length > 0) {
                const random = topShows[Math.floor(Math.random() * Math.min(5, topShows.length))];
                UI.renderHero(heroEl, random, 'tvmaze');
            }
        }

        function getFilteredShows() {
            return allShows.filter(show => {
                if (currentGenre && !(show.genres || []).includes(currentGenre)) return false;
                if (currentStatus && show.status !== currentStatus) return false;
                return true;
            });
        }

        function filterAndDisplay() {
            displayedCount = 0;
            const grid = document.getElementById('tvGrid');
            grid.innerHTML = '';
            const filtered = getFilteredShows();
            const batch = filtered.slice(0, ITEMS_PER_PAGE);
            batch.forEach(show => grid.appendChild(UI.createMovieCard(show, 'tvmaze')));
            displayedCount = batch.length;

            document.getElementById('loadMoreBtn').style.display =
                displayedCount >= filtered.length ? 'none' : '';
        }

        function loadMoreShows() {
            const grid = document.getElementById('tvGrid');
            const filtered = getFilteredShows();
            const batch = filtered.slice(displayedCount, displayedCount + ITEMS_PER_PAGE);
            batch.forEach(show => grid.appendChild(UI.createMovieCard(show, 'tvmaze')));
            displayedCount += batch.length;

            document.getElementById('loadMoreBtn').style.display =
                displayedCount >= filtered.length ? 'none' : '';
        }

        return { init };
    })();
    document.addEventListener('DOMContentLoaded', TVShowsPage.init);
    </script>
</body>
</html>
