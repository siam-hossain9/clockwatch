<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Search across movies, TV shows, and anime on Dororo.">
    <meta property="og:title" content="Search - Dororo">
    <meta name="theme-color" content="#E50914">
    <title>Search - Dororo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-family='Arial' fill='%23E50914'>D</text></svg>">
    <link rel="stylesheet" href="css/style.css?v=11">
    <link rel="stylesheet" href="css/animations.css?v=11">
    <link rel="stylesheet" href="css/responsive.css?v=11">
</head>
<body>
    <nav id="main-nav" aria-label="Main navigation"></nav>

    <main class="page-content">
        <div class="search-page-header">
            <a href="index.html" class="nav-logo" style="display:inline-flex;margin-bottom:16px;">
                <span class="logo-text" style="font-size:2rem;">Dororo</span>
            </a>
            <h1 class="page-title" style="font-size:1.5rem;color:var(--color-text-muted);font-weight:400;">Search across Movies, TV Shows &amp; Anime</h1>
            <div class="search-page-input">
                <form id="searchPageForm" style="display:flex;gap:10px;width:100%;">
                    <input type="text" id="searchPageInput" placeholder="What do you want to watch?" autocomplete="off" />
                    <button type="submit" class="btn btn-primary">Search</button>
                </form>
            </div>
            <div class="search-tabs">
                <button class="search-tab active" data-tab="all">All</button>
                <button class="search-tab" data-tab="movies">Movies</button>
                <button class="search-tab" data-tab="tv">TV Shows</button>
                <button class="search-tab" data-tab="anime">Anime</button>
            </div>
        </div>

        <div id="searchResults">
            <div class="mylist-empty">
                <div class="mylist-empty-icon">Search</div>
                <h2>Start searching</h2>
                <p class="text-muted">Search for your favorite movies, TV shows, or anime</p>
            </div>
        </div>
    </main>

    <footer id="main-footer" aria-label="Footer"></footer>

    <script src="js/config.js?v=11"></script>
    <script src="js/api.js?v=11"></script>
    <script src="js/mylist.js?v=11"></script>
    <script src="js/ui.js?v=11"></script>
    <script src="js/search.js?v=11"></script>
</body>
</html>
