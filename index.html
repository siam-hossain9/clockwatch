<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WASUSANOCH - Your ultimate destination to discover movies, TV shows, and anime. Find what to watch next!">
    <meta name="keywords" content="movies, TV shows, anime, streaming, WASUSANOCH, watch, discover">
    <meta name="author" content="WASUSANOCH">
    <meta property="og:title" content="WASUSANOCH - Your Time to Watch">
    <meta property="og:description" content="Discover trending movies, popular TV shows, and top anime all in one place.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#E50914">
    <title>WASUSANOCH - Your Time to Watch</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-family='Arial'>W</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav id="main-nav" aria-label="Main navigation"></nav>

    <main class="page-content">
        <section class="hero" id="hero" aria-label="Featured content">
            <div class="hero-backdrop" style="background:var(--bg-primary)"></div>
            <div class="hero-gradient"></div>
            <div class="hero-content" style="padding-top:250px;">
                <div class="skeleton-title skeleton-shimmer" style="height:40px;width:60%;margin-bottom:16px;border-radius:6px;"></div>
                <div class="skeleton-meta skeleton-shimmer" style="height:20px;width:40%;margin-bottom:20px;border-radius:4px;"></div>
                <div class="skeleton-meta skeleton-shimmer" style="height:60px;width:80%;border-radius:4px;"></div>
            </div>
        </section>

        <div id="content-rows">
            <!-- Rows loaded by JS -->
        </div>
    </main>

    <footer id="main-footer" aria-label="Footer"></footer>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/mylist.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
